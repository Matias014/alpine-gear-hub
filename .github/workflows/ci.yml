name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ──────────────────────────────────────────────────────────────────
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore
        working-directory: backend

      - name: Build
        run: dotnet build --no-restore --configuration Release
        working-directory: backend

      - name: Test
        run: dotnet test --no-build --configuration Release --logger "console;verbosity=normal"
        working-directory: backend

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Test
        run: npm test
        working-directory: frontend

  # ── Docker images ────────────────────────────────────────────────────────────
  docker-build:
    name: Build & push Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Lowercase repository name
        id: repo
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/backend:latest
            ghcr.io/${{ steps.repo.outputs.name }}/backend:${{ github.sha }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:latest
            ghcr.io/${{ steps.repo.outputs.name }}/frontend:${{ github.sha }}
